# ---------------------------------------------------------------------------
# Grafana Dashboard Provisioning
# ---------------------------------------------------------------------------
# Tells Grafana to load dashboards from /var/lib/grafana/dashboards on startup.

apiVersion: 1

providers:
  - name: 'default'
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
