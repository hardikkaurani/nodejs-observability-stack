# ---------------------------------------------------------------------------
# Prometheus Alert Rules
# ---------------------------------------------------------------------------
#
# WHY sum() IS REQUIRED:
#
# The http_errors_total counter has label {route}, while http_requests_total
# has labels {method, route, status}. When Prometheus evaluates a binary
# operation (division) between two metrics, it tries to match them on their
# shared labels. Because the label sets differ, the operation produces no
# results unless we aggregate both sides down to a common (or empty) label
# set using sum().
#
# sum(rate(...)) removes all labels, producing a single scalar on each side
# of the division. This guarantees the division always works correctly
# regardless of the label cardinality on each metric.
# ---------------------------------------------------------------------------

groups:
  - name: application_alerts
    rules:
      # HighErrorRate: Fires when the error rate exceeds 2% over a 1-minute window.
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_errors_total[1m]))
            /
            sum(rate(http_requests_total[1m]))
          ) * 100 > 2
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected (> 2%)"
          description: >
            The application error rate has exceeded 2% for the last 1 minute.
            Current error rate: {{ $value | printf "%.2f" }}%.
            Investigate the application logs and /fail endpoint usage.
