# ---------------------------------------------------------------------------
# Prometheus Configuration
# ---------------------------------------------------------------------------
# Scrape configuration for the Node.js application and Prometheus itself.

global:
  scrape_interval: 15s        # Scrape targets every 15 seconds
  evaluation_interval: 15s    # Evaluate alert rules every 15 seconds

# ---------------------------------------------------------------------------
# Alertmanager integration
# ---------------------------------------------------------------------------
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# ---------------------------------------------------------------------------
# Alert rules
# ---------------------------------------------------------------------------
rule_files:
  - /etc/prometheus/alert_rules.yml

# ---------------------------------------------------------------------------
# Scrape targets
# ---------------------------------------------------------------------------
scrape_configs:
  # Scrape the Node.js application
  - job_name: 'nodejs-app'
    static_configs:
      - targets: ['app:3000']
        labels:
          environment: 'docker'
          service: 'nodejs-observability-app'

  # Scrape Prometheus itself (for self-monitoring)
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
