# ---------------------------------------------------------------------------
# Docker Compose — Observability Stack
# ---------------------------------------------------------------------------
# Services:
#   app           → Node.js application          (port 3000)
#   prometheus    → Metrics collection & alerting (port 9090)
#   grafana       → Dashboards & visualization    (port 3001)
#   alertmanager  → Alert routing & management    (port 9093)
#
# Usage:
#   docker-compose up --build
# ---------------------------------------------------------------------------

services:
  # -------------------------------------------------------------------------
  # Node.js Application
  # -------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: observability-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    networks:
      - observability-network
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # Prometheus — Metrics Collection & Alerting
  # -------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: observability-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    networks:
      - observability-network
    depends_on:
      - app
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # Grafana — Dashboards & Visualization
  # -------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.1.0
    container_name: observability-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      # Provisioning: automatically configure datasource and dashboard
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      - observability-network
    depends_on:
      - prometheus
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # Alertmanager — Alert Routing & Management
  # -------------------------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: observability-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - observability-network
    restart: unless-stopped

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  prometheus-data:
  grafana-data:

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  observability-network:
    driver: bridge
